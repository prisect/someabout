<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="dima, the one...">
    <meta name="keywords" content="dima, dimalmfao">
    <meta name="author" content="@dimalmfao">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>dima</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&display=swap');

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: "Inconsolata", monospace;
            color: white;
            background-color: #1D1E22;
            position: relative;
        }

        a {
            color: #667B96;
            text-decoration: none;
        }

        a:hover {
            color: #babdc4;
        }

        nav a {
            display: block;
            margin: 5px 0;
            cursor: pointer;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .github {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px;
        }

        #sessionid {
            position: absolute;
            top: 0;
            right: 0;
            padding: 10px;
            font-size: 12px;
            color: #667B96;
        }

        .sub {
            position: relative;
            bottom: 0.6em;
            font-size: 16px;
        }

        /* unified center column */
        .center-column {
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* about content */
        .about-content {
            width: 100%;
            text-align: left;
            padding-left: 8px; /* optical centering */
        }

        .about-content h5 {
            margin: 12px 0 6px;
            font-weight: normal;
            color: #babdc4;
        }

        .about-content ul {
            list-style: none;
            padding-left: 0;
            margin: 0 0 12px;
        }

        .about-content li::before {
            content: "– ";
            color: #667B96;
        }
    </style>
</head>

<body>
    <a class="github" href="https://github.com/prisect">
        <img src="github-mark/github-mark-white.svg" width="30" height="30">
    </a>

    <div class="center-column">
        <img src="https://avatars.githubusercontent.com/u/78304878?v=4"
             width="100" height="100" style="border-radius:50%;">

        <h2>dima / prisect</h2>
        <span class="sub">online, somewhere, sometimes</span>

        <nav>
            <a href="https://src.eco/">the source</a>
            <a href="https://nullcel.com/">nullcel</a>
        <a href="https://up!/">up!</a>
            <a href="#about" onclick="showSection('about'); return false;">about</a>
        </nav>

        <!-- ABOUT SECTION -->
        <div id="about" class="section">
            <h4>about</h4>
            <hr width="100">

            <div class="about-content">
                <h5>Interests</h5>
                <ul>
                    <li>Aviation</li>
                    <li>Mathematics</li>
                    <li>Deep Learning</li>
                    <li>NLP</li>
                    <li>Neuro-Symbolic AI</li>
                </ul>

                <h5>Games</h5>
                <ul>
                    <li>Steep</li>
                    <li>Diablo IV</li>
                    <li>MSFS 24</li>
                </ul>
            </div>
        </div>
    </div>

    <div id="sessionid"></div>

    <script>
        function showSection(sectionId) {
            history.pushState({ section: sectionId }, "", `#${sectionId}`);

            document.querySelector('h2').classList.add('hidden');
            document.querySelector('nav').classList.add('hidden');
            document.querySelector('.sub').classList.add('hidden');

            document.querySelectorAll('.section').forEach(s =>
                s.classList.remove('active')
            );

            document.getElementById(sectionId).classList.add('active');
        }

        function showMain() {
            document.querySelector('h2').classList.remove('hidden');
            document.querySelector('nav').classList.remove('hidden');
            document.querySelector('.sub').classList.remove('hidden');

            document.querySelectorAll('.section').forEach(s =>
                s.classList.remove('active')
            );

            history.pushState({}, "", "/");
        }

        window.onpopstate = function (event) {
            if (event.state && event.state.section) {
                showSection(event.state.section);
            } else {
                showMain();
            }
        };

        window.onload = function () {
            const hash = location.hash.replace("#", "");
            if (hash) showSection(hash);

            document.getElementById('sessionid').textContent = generateSessionID();
        };

        function generateSessionID() {
            const rand = Math.random().toString(36).substr(2, 8).toUpperCase();
            const date = new Date().toISOString().slice(0, 10).replace(/-/g, "");
            return rand + date;
        }
    </script>
</body>
</html>
