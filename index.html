<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="dima" />
  <meta name="keywords" content="dima, prisect" />
  <meta name="author" content="@prisect" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="300" />
  <title>dima</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');

    :root {
      --bg: #1D1E22;
      --text: #fff;
      --muted: #667B96;
      --light: #babdc4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Geist", sans-serif;
      background: var(--bg);
      color: var(--text);
      position: relative;
    }

    a {
      color: var(--muted);
      text-decoration: none;
    }

    a:hover {
      color: var(--light);
    }

    nav a {
      display: block;
      margin: 5px 0;
      text-align: center;
    }

    .hidden {
      display: none;
    }

    .section {
      display: none;
    }

    .section.active {
      display: block;
    }

    .github {
      position: absolute;
      top: 10px;
      left: 10px;
    }

    #sessionid {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .center {
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
    }

    .sub {
      font-size: 16px;
      margin-top: -18px;
      margin-bottom: 8px;
    }

    .about-content {
      width: 100%;
      text-align: left;
      padding-left: 8px;
    }

    .about-content h5 {
      margin: 12px 0 6px;
      font-weight: normal;
      color: var(--light);
    }

    .about-content ul {
      list-style: none;
      padding: 0;
      margin: 0 0 12px;
    }

    .about-content li::before {
      content: "– ";
      color: var(--muted);
    }
  </style>
</head>

<body>
  <a class="github" href="https://github.com/prisect">
    <img src="github-mark/github-mark-white.svg" width="30" height="30" />
  </a>

  <div class="center">
    <img id="avatar" class="avatar" src="https://avatars.githubusercontent.com/u/78304878?v=4" />

    <h2 id="title">dima / prisect</h2>
    <span class="sub" id="subtitle">Locked in</span>

    <nav id="nav">
      <a href="https://src.eco/">the source</a>
      <a href="https://nullcel.com/">nullcel</a>
      <a href="https://vastdisk.com/">vastdisk</a>
      <a href="https://up!/">up!</a>
      <a href="#about" data-section="about">about</a>
    </nav>

    <!-- ABOUT -->
    <div id="about" class="section">
      <h2>about</h2>
      <hr width="100" />

      <div class="about-content">
        <h5>Interests</h5>
        <ul>
          <li>Aviation</li>
          <li>Mathematics</li>
          <li>Deep Learning</li>
          <li>NLP</li>
          <li>Neuro-Symbolic AI</li>
        </ul>

        <h5>Games</h5>
        <ul>
          <li>Steep</li>
          <li>Diablo IV</li>
          <li>MSFS 24</li>
        </ul>
      </div>
    </div>
  </div>

  <div id="sessionid"></div>

  <script>
    const title = document.getElementById("title");
    const subtitle = document.getElementById("subtitle");
    const nav = document.getElementById("nav");
    const sections = document.querySelectorAll(".section");

    function toggleMain(show) {
      [title, subtitle, nav, avatar].forEach(el =>
        el.classList.toggle("hidden", !show)
      );
    }

    function showSection(id) {
      history.pushState({ section: id }, "", `#${id}`);

      toggleMain(false);
      sections.forEach(s => s.classList.remove("active"));

      document.getElementById(id).classList.add("active");
    }

    function showMain() {
      toggleMain(true);
      sections.forEach(s => s.classList.remove("active"));

      history.pushState({}, "", "/");
    }

    window.onpopstate = (e) => {
      e.state?.section ? showSection(e.state.section) : showMain();
    };

    document.querySelectorAll("[data-section]").forEach(link => {
      link.onclick = (e) => {
        e.preventDefault();
        showSection(link.dataset.section);
      };
    });

    function generateSessionID() {
      const rand = Math.random().toString(36).slice(2, 10).toUpperCase();
      const date = new Date().toISOString().slice(0, 10).replace(/-/g, "");
      return rand + date;
    }

    window.onload = () => {
      const hash = location.hash.slice(1);
      if (hash) showSection(hash);

      document.getElementById("sessionid").textContent = generateSessionID();
    };
  </script>
</body>
</html>
